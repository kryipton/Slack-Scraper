<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a154b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#611f69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3085;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00c49a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007a5a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Slack-style # symbol -->
  <g fill="#ffffff" opacity="0.95">
    <!-- Vertical bars -->
    <rect x="38" y="28" width="12" height="72" rx="2"/>
    <rect x="78" y="28" width="12" height="72" rx="2"/>
    <!-- Horizontal bars -->
    <rect x="28" y="48" width="72" height="12" rx="2"/>
    <rect x="28" y="68" width="72" height="12" rx="2"/>
  </g>
  
  <!-- Download arrow overlay -->
  <g transform="translate(64, 88)">
    <circle cx="0" cy="0" r="18" fill="url(#accentGradient)"/>
    <path d="M-6 -4 L0 4 L6 -4 M0 -8 L0 4" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>